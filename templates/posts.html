{% extends "layout.html" %}

{% block title %}Ilmoitukset{% endblock %}

{% block content %}
<h2>Ilmoitukset</h2>
<p>
    <a href="/new-post">Luo ilmoitus</a>
</p>
<p>
    Ilmoituksia: {{ count }}
</p>
<hr/>
<table>
<thead>
    <tr>
        <td>Ilmoittaja</td>
        <td>Lainattava asia</td>
    </tr>
</thead>
{% for post in posts %}
    <tr>
        <td>
            {{ post["author"]}}
        </td>
        <td>
           <a href="/post/{{ post['id'] }}">{{ post["item"] }}</a>
        </td>
    </tr>
{% endfor %}
</table>
{% endblock %}
