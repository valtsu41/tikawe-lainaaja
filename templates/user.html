{% extends "layout.html" %}

{% block title %}Käyttäjä {{ user.username }}{% endblock %}

{% block content %}
<h2>Käyttäjä {{ user.username }}</h2>
<hr>
<h3>Käyttäjän ilmoitukset</h3>
<table>
<thead>
    <tr>
        <td>Lainattava asia</td>
    </tr>
</thead>
{% for post in posts %}
    <tr>
        <td>
           <a href="/posts/{{ post['id'] }}">{{ post["item"] }}</a>
        </td>
    </tr>
{% endfor %}
</table>
{% endblock %}
